server:
  port: 4000
  servlet:
    context-path: /api/v1

spring:
  application:
    name: tenant_table-api

  config:
    import: optional:file:.env[.properties]

  profiles:
    active: ${ACTIVE_PROFILE}

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}

    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true


platform:
  admin:
    name: ${PLATFORM_ADMIN_NAME}
    email: ${PLATFORM_ADMIN_EMAIL}
    password: ${PLATFORM_ADMIN_PASSWORD}
    phone: ${PLATFORM_ADMIN_PHONE}


jwt:
  secret: ${JWT_SECRET}
  access-expiry: ${JWT_ACCESS_TOKEN_EXPIRY}
  refresh-expiry: ${JWT_REFRESH_TOKEN_EXPIRY}

  refresh-token:
      cookie-name: ${JWT_REFRESH_TOKEN_COOKIE_NAME}

otp:
  expiry: ${OTP_EXPIRY}
  length: ${OTP_LENGTH}