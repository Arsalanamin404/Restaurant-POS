server:
  port: 4000
  servlet:
    context-path: /api/v1

spring:
  application:
    name: tenant_table-api

  config:
    import: optional:file:.env[.properties]

  profiles:
    active: ${ACTIVE_PROFILE}

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true


admin:
  full_name: ${ADMIN_FULL_NAME}
  email: ${ADMIN_EMAIL}
  password: ${ADMIN_PASSWORD}


jwt:
  secret: ${JWT_SECRET}
  access-expiry: ${JWT_ACCESS_TOKEN_EXPIRY}
  refresh-expiry: ${JWT_REFRESH_TOKEN_EXPIRY}

  refresh-token:
      cookie-name: ${JWT_REFRESH_TOKEN_COOKIE_NAME}

cookie:
  secure: false